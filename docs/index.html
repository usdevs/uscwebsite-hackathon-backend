<html>
  <body>
    <div class="project">
      <!-- This div contains the project information -->
      <div class="project-content">
        <h3>Sample Project</h3>
        <p>This is a cool project that does things</p>
      </div>
      <div id="output" style="outline: 1px solid silver; padding: 2em">
        <span>Output shows here...</span>
      </div>
      <div>
        <div>
          <h4>Sent</h4>
          <div style="outline: 1px solid silver; padding: 2em">
            <pre id="payload"><span>Nothing sent yet...</span></pre>
          </div>
        </div>
      </div>
      <script
        async
        src="https://telegram.org/js/telegram-widget.js?21"
        data-telegram-login="usdevs_bot"
        data-size="large"
        data-userpic="false"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write"
      ></script>
      <script type="text/javascript">
        let output = document.getElementById('output')
        let sent = document.getElementById('payload')
        function onTelegramAuth(user) {
          alert(
            'Logged in as ' +
              user.first_name +
              ' ' +
              user.last_name +
              ' (' +
              user.id +
              (user.username ? ', @' + user.username : '') +
              ')'
          )

          const headers = {
            Accept: 'application/json',
            'Content-Type': 'application/json',
          }

          const payload = user
          const body = {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: headers,
          }
          fetch('http:\/\/localhost:3000/login', body)
            .then((response) => response.text())
            .then((data) => {
              sent.innerHTML = JSON.stringify(user, undefined, 4)
              output.innerHTML += `<br /><strong>Response from login service</strong>: ${data}`
            })
            .catch((error) => {
              output.innerHTML += '<br /><br />Error: ' + error
            })
        }
      </script>
    </div>
  </body>
</html>
